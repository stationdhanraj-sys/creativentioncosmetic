<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmetics Inventory Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fdf5f3;
    --surface:#ffffff;
    --primary:#b6406a;
    --primary-dark:#7d2a4d;
    --primary-light:#f3d6df;
    --gold:#c9a35d;
    --text:#3a2433;
    --muted:#8a6b7a;
    --success:#3f8f5f;
    --success-bg:#e7f5ec;
    --danger:#c44545;
    --danger-bg:#fbe9e9;
    --warn:#b07a1f;
    --warn-bg:#fdf1de;
    --border:#ecdde2;
    --shadow: 0 4px 18px rgba(122,42,77,0.08);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Poppins',sans-serif;}
  h1,h2,h3{font-family:'Playfair Display',serif;margin:0;}
  button{font-family:'Poppins',sans-serif;cursor:pointer;}
  input,select,textarea{font-family:'Poppins',sans-serif;}

  .topbar{
    background:linear-gradient(120deg,var(--primary-dark),var(--primary));
    color:#fff;padding:18px 28px;display:flex;align-items:center;justify-content:space-between;
    box-shadow:var(--shadow);position:sticky;top:0;z-index:50;
  }
  .topbar .brand{display:flex;align-items:center;gap:10px;}
  .topbar .brand h1{font-size:22px;color:#fff;letter-spacing:.3px;}
  .topbar .brand span{font-size:24px;}
  .home-btn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.35);color:#fff;padding:8px 16px;border-radius:30px;font-size:13px;font-weight:600;}
  .home-btn:hover{background:rgba(255,255,255,0.28);}

  .container{max-width:1180px;margin:0 auto;padding:26px 20px 60px;}

  /* Alerts */
  .alert-bar{max-width:1180px;margin:14px auto 0;padding:0 20px;display:flex;flex-direction:column;gap:8px;}
  .alert{padding:11px 16px;border-radius:12px;font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:8px;}
  .alert.expiry{background:var(--warn-bg);color:var(--warn);border:1px solid #f0d9ad;}
  .alert.lowstock{background:var(--danger-bg);color:var(--danger);border:1px solid #f3c6c6;}

  /* Dashboard */
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:30px;}
  .stat-card{background:var(--surface);border-radius:16px;padding:18px 20px;box-shadow:var(--shadow);border-left:5px solid var(--primary);}
  .stat-card .label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:600;}
  .stat-card .value{font-size:24px;font-weight:700;margin-top:6px;color:var(--primary-dark);}
  .stat-card.gold{border-left-color:var(--gold);}
  .stat-card.green{border-left-color:var(--success);}
  .stat-card.red{border-left-color:var(--danger);}

  .nav-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:18px;}
  .nav-btn{
    background:var(--surface);border:none;border-radius:18px;padding:26px 14px;box-shadow:var(--shadow);
    display:flex;flex-direction:column;align-items:center;gap:10px;transition:transform .15s, box-shadow .15s;
    border-bottom:4px solid transparent;
  }
  .nav-btn:hover{transform:translateY(-4px);box-shadow:0 10px 24px rgba(122,42,77,0.16);}
  .nav-btn .icon{font-size:34px;}
  .nav-btn .title{font-weight:600;font-size:15px;color:var(--text);}
  .nav-btn.c1{border-bottom-color:#b6406a;} .nav-btn.c2{border-bottom-color:#c9a35d;}
  .nav-btn.c3{border-bottom-color:#3f8f5f;} .nav-btn.c4{border-bottom-color:#c44545;}
  .nav-btn.c5{border-bottom-color:#6f4fa8;} .nav-btn.c6{border-bottom-color:#3585b0;}

  /* Section header */
  .section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
  .section-head h2{font-size:26px;color:var(--primary-dark);}
  .section-head .sub{color:var(--muted);font-size:13px;margin-top:4px;}

  .card{background:var(--surface);border-radius:16px;padding:22px;box-shadow:var(--shadow);margin-bottom:22px;}
  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;}
  .field{display:flex;flex-direction:column;gap:6px;}
  .field label{font-size:12.5px;font-weight:600;color:var(--muted);}
  .field input, .field select, .field textarea{
    padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;background:#fffdfc;color:var(--text);
  }
  .field input:focus, .field select:focus, .field textarea:focus{outline:none;border-color:var(--primary);}
  .field.full{grid-column:1/-1;}
  .img-preview{width:70px;height:70px;border-radius:10px;object-fit:cover;border:1px solid var(--border);background:#f7eef1;}
  .img-drop{display:flex;align-items:center;gap:12px;}

  .btn{padding:11px 22px;border-radius:10px;border:none;font-weight:600;font-size:14px;}
  .btn-primary{background:var(--primary);color:#fff;}
  .btn-primary:hover{background:var(--primary-dark);}
  .btn-outline{background:#fff;border:1.5px solid var(--primary);color:var(--primary);}
  .btn-outline:hover{background:var(--primary-light);}
  .btn-danger-sm{background:var(--danger-bg);color:var(--danger);border:none;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;}
  .btn-row{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;}

  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{background:var(--primary-light);color:var(--primary-dark);text-align:left;padding:10px 12px;font-weight:700;}
  td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
  tr:hover td{background:#fbf2f4;}
  .table-wrap{overflow-x:auto;}
  .pill{padding:4px 10px;border-radius:20px;font-size:11.5px;font-weight:700;}
  .pill.profit{background:var(--success-bg);color:var(--success);}
  .pill.loss{background:var(--danger-bg);color:var(--danger);}
  .pill.damage{background:#fde7e7;color:#a83232;}
  .pill.refund{background:#eee3fb;color:#6f4fa8;}
  .thumb{width:42px;height:42px;border-radius:8px;object-fit:cover;border:1px solid var(--border);}
  .empty{padding:30px;text-align:center;color:var(--muted);font-size:14px;}

  .filter-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px;}
  .filter-row select, .filter-row input{padding:8px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;}
  .tab-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
  .tab-btn{padding:9px 18px;border-radius:30px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:600;color:var(--muted);}
  .tab-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}

  .badge-stock{display:inline-block;padding:3px 9px;border-radius:8px;font-size:11.5px;font-weight:700;background:var(--success-bg);color:var(--success);}
  .badge-stock.low{background:var(--danger-bg);color:var(--danger);}

  .summary-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:18px;}
  .summary-box{background:#fff;border-radius:12px;padding:14px 16px;box-shadow:var(--shadow);}
  .summary-box .l{font-size:11.5px;color:var(--muted);text-transform:uppercase;font-weight:600;}
  .summary-box .v{font-size:19px;font-weight:700;margin-top:4px;color:var(--primary-dark);}

  @media print{
    .topbar, .btn-row, .filter-row, .tab-row, .home-btn, .alert-bar{display:none !important;}
    body{background:#fff;}
  }
  ::-webkit-scrollbar{height:8px;width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--primary-light);border-radius:10px;}

  /* ---------- RESPONSIVE: TABLET & PHONE ---------- */
  @media (max-width:900px){
    .container{padding:20px 14px 50px;}
    .stats-grid{grid-template-columns:1fr 1fr;}
    .nav-grid{grid-template-columns:repeat(3,1fr);}
  }
  @media (max-width:640px){
    .topbar{padding:12px 14px;}
    .topbar .brand h1{font-size:17px;}
    .topbar .brand span{font-size:20px;}
    .home-btn{padding:7px 12px;font-size:12px;}
    .container{padding:16px 10px 50px;}

    .stats-grid{grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px;}
    .stat-card{padding:14px 14px;border-radius:14px;}
    .stat-card .label{font-size:10.5px;}
    .stat-card .value{font-size:18px;}

    .nav-grid{grid-template-columns:repeat(2,1fr);gap:12px;}
    .nav-btn{padding:20px 8px;border-radius:14px;}
    .nav-btn .icon{font-size:28px;}
    .nav-btn .title{font-size:13px;text-align:center;}

    .section-head h2{font-size:21px;}
    .card{padding:16px;border-radius:14px;}
    .form-grid{grid-template-columns:1fr;gap:12px;}

    .btn-row{flex-direction:column;}
    .btn-row .btn{width:100%;}
    .btn{padding:12px 18px;font-size:14px;}

    table{font-size:12.5px;}
    th, td{padding:8px 8px;}
    .thumb{width:34px;height:34px;}
    .img-preview{width:56px;height:56px;}

    .filter-row{flex-direction:column;align-items:stretch;}
    .filter-row select, .filter-row input, .filter-row .btn-outline{width:100%;}
    .tab-row{overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;padding-bottom:4px;}
    .tab-btn{flex:0 0 auto;white-space:nowrap;}

    .summary-strip{grid-template-columns:1fr 1fr;gap:10px;}
    .summary-box{padding:12px;}
    .summary-box .v{font-size:16px;}
  }
  @media (max-width:380px){
    .stats-grid, .nav-grid, .summary-strip{grid-template-columns:1fr;}
  }
</style>
</head>

<div class="topbar">

<script type="module">

   FIREBASE SETUP (cloud sync — same data on every device)
--------------------------------------------------- */

import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  authDomain: "creativetions.firebaseapp.com",
  projectId: "creativetions",
  storageBucket: "creativetions.firebasestorage.app",
  messagingSenderId: "396502534100",
  appId: "1:396502534100:web:f2a0d96e72e1a4ea08f841",
  measurementId: "G-746S4Q21CQ"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

/* ---------------------------------------------------
   LOGIN (simple access lock + inactivity auto-logout)
--------------------------------------------------- */
const APP_USER = "vimmi.5saini";
const APP_PASS = "jazjazjp54";
const INACTIVITY_LIMIT_MS = 15 * 60 * 1000; // 15 minutes

function isLoggedIn(){
  if(localStorage.getItem('cosm_auth') !== '1') return false;
  const last = Number(localStorage.getItem('cosm_lastActivity') || 0);
  if(Date.now() - last > INACTIVITY_LIMIT_MS){
    localStorage.removeItem('cosm_auth');
    return false;
  }
  return true;
}
function touchActivity(){
  if(localStorage.getItem('cosm_auth') === '1'){
    localStorage.setItem('cosm_lastActivity', String(Date.now()));
  }
}
['click','keydown','mousemove','touchstart','scroll'].forEach(evt=>{
  document.addEventListener(evt, touchActivity, {passive:true});
});
setInterval(()=>{
  if(localStorage.getItem('cosm_auth')==='1'){
    const last = Number(localStorage.getItem('cosm_lastActivity')||0);
    if(Date.now()-last > INACTIVITY_LIMIT_MS){
      doLogout();
      alert('Bohot der se koi activity nahi hui, isliye aap automatically logout ho gaye hain.');
    }
  }
}, 60*1000);

function renderLogin(){
  document.getElementById('alertBar').innerHTML = '';
  app.innerHTML = `
    <div style="max-width:380px;margin:70px auto;">
      <div class="card" style="text-align:center;">
        <div style="font-size:38px;margin-bottom:6px;">🔒</div>
        <h2 style="color:var(--primary-dark);margin-bottom:4px;">Login</h2>
        <div class="sub" style="color:var(--muted);font-size:13px;margin-bottom:20px;">Cosmetics Inventory Manager</div>
        <form id="loginForm" onsubmit="event.preventDefault(); doLogin();" style="display:flex;flex-direction:column;gap:14px;text-align:left;">
          <div class="field"><label>User ID</label><input name="uid" required autocomplete="username"></div>
          <div class="field"><label>Password</label><input name="pass" type="password" required autocomplete="current-password"></div>
          <div id="loginError" style="color:var(--danger);font-size:13px;display:none;">Galat ID ya password.</div>
          <button type="submit" class="btn btn-primary" style="width:100%;">Login</button>
        </form>
      </div>
    </div>
  `;
}
function doLogin(){
  const f = document.getElementById('loginForm');
  if(f.uid.value.trim() === APP_USER && f.pass.value === APP_PASS){
    localStorage.setItem('cosm_auth','1');
    localStorage.setItem('cosm_lastActivity', String(Date.now()));
    renderDashboard();

    document.getElementById('loginError').style.display='block';
  }

function doLogout(){

  localStorage.removeItem('cosm_lastActivity');
  renderLogin();
}

/* ---------------------------------------------------
   STORAGE HELPERS  (Firestore — same data on every device)
--------------------------------------------------- */
async function loadList(key){
  try{
    const snap = await getDoc(doc(db, 'cosmetics_data', key));
    return snap.exists() ? (snap.data().items || []) : [];
  }catch(e){ console.error('load failed', key, e); return []; }
}
async function saveList(key, arr){
  try{ await setDoc(doc(db, 'cosmetics_data', key), { items: arr }); }
  catch(e){ console.error('save failed', key, e); alert('Save mein masla aaya — internet connection check karein.'); }
}
async function resetAllData(){
  if(!confirm('Pakka? Yeh SAB purani entries (vendor, purchase, sale, refund, expense) hamesha ke liye delete kar dega.')) return;
  for(const k of ['vendors','purchases','sales','refunds','expenses']){
    await saveList(k, []);
  }
  alert('Sab purana data delete ho gaya. Ab aap dobara add kar sakte hain.');
  renderDashboard();
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function money(n){ n = Number(n)||0; return '$' + n.toLocaleString('en-US',{minimumFractionDigits:2, maximumFractionDigits:2}); }
function fileToBase64(file){
  return new Promise((res,rej)=>{
    if(!file){ res(''); return; }
    const r = new FileReader();
    r.onload = ()=>res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}
function escapeHtml(s){ return (s||'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function formatDate(iso){
  if(!iso) return '—';
  const parts = String(iso).split('-');
  if(parts.length !== 3) return iso;
  const [y,m,d] = parts;
  return `${m}/${d}/${y}`;
}
function sortByDateDesc(arr){
  return arr.slice().sort((a,b)=>{
    const da = a.date ? new Date(a.date).getTime() : 0;
    const db = b.date ? new Date(b.date).getTime() : 0;
    return db - da;
  });
}
function matchesSearch(rec, q){
  if(!q) return true;
  q = q.toLowerCase();
  return (rec.item||'').toLowerCase().includes(q) || (rec.brand||'').toLowerCase().includes(q) || (rec.name||'').toLowerCase().includes(q);
}
function itemKey(brand, item, size){
  return [(brand||'').trim().toLowerCase(), (item||'').trim().toLowerCase(), (size||'').trim().toLowerCase()].join('|');
}

/* ---------------------------------------------------
   DATA MODEL HELPERS
--------------------------------------------------- */
async function getAll(){
  const [vendors, purchases, sales, refunds, expenses] = await Promise.all([
    loadList('vendors'), loadList('purchases'), loadList('sales'), loadList('refunds'), loadList('expenses')
  ]);
  return {vendors, purchases, sales, refunds, expenses};
}

// Vendor catalog lookup: find the vendor entry matching brand+item+size (any vendor, most recent wins)
function findVendorCatalogEntry(vendors, brand, item, size){
  const key = itemKey(brand, item, size);
  const matches = vendors.filter(v => itemKey(v.brand, v.item, v.size) === key);
  return matches.length ? matches[matches.length-1] : null;
}

function computeStock(data){
  const map = {}; // key(brand|item|size) -> aggregated stock info
  data.vendors.forEach(v=>{
    const k = itemKey(v.brand, v.item, v.size);
    if(!map[k]) map[k] = {brand:v.brand||'', item:v.item, size:v.size||'', purchasedQty:0, purchaseCost:0, soldQty:0, damagedQty:0, returnedQty:0, lastDesc:'', lastImage:'', lastSalePrice:0, lastVendor:'', expireDate:''};
    // vendor catalog only seeds description/image/expiry as a fallback — it does not affect quantities
    map[k].lastDesc = map[k].lastDesc || v.description || '';
    map[k].lastImage = map[k].lastImage || v.image || '';
    map[k].lastVendor = map[k].lastVendor || v.name || '';
    if(!map[k].expireDate && v.expireDate) map[k].expireDate = v.expireDate;
  });
  data.purchases.forEach(p=>{
    const k = itemKey(p.brand, p.item, p.size);
    if(!map[k]) map[k] = {brand:p.brand||'', item:p.item, size:p.size||'', purchasedQty:0, purchaseCost:0, soldQty:0, damagedQty:0, returnedQty:0, lastDesc:'', lastImage:'', lastSalePrice:0, lastVendor:'', expireDate:''};
    map[k].purchasedQty += Number(p.quantity)||0;
    map[k].purchaseCost += (Number(p.quantity)||0) * (Number(p.buyPrice)||0);
    map[k].lastDesc = p.description || map[k].lastDesc;
    map[k].lastImage = p.image || map[k].lastImage;
    map[k].lastSalePrice = p.salePrice || map[k].lastSalePrice;
    map[k].lastVendor = p.vendorName || map[k].lastVendor;
    if(p.expireDate) map[k].expireDate = p.expireDate;
  });
  data.sales.forEach(s=>{
    const k = itemKey(s.brand, s.item, s.size);
    if(!map[k]) map[k] = {brand:s.brand||'', item:s.item, size:s.size||'', purchasedQty:0, purchaseCost:0, soldQty:0, damagedQty:0, returnedQty:0, lastDesc:s.description||'', lastImage:s.image||'', lastSalePrice:s.salePrice||0, lastVendor:'', expireDate:''};
    map[k].soldQty += Number(s.quantity)||0;
    map[k].lastImage = map[k].lastImage || s.image || '';
  });
  data.refunds.forEach(r=>{
    const k = itemKey(r.brand, r.item, r.size);
    if(!map[k]) map[k] = {brand:r.brand||'', item:r.item, size:r.size||'', purchasedQty:0, purchaseCost:0, soldQty:0, damagedQty:0, returnedQty:0, lastDesc:'', lastImage:r.image||'', lastSalePrice:0, lastVendor:'', expireDate:''};
    if(r.status === 'expired') map[k].damagedQty += Number(r.quantity)||0;
    else if(r.status === 'returned') map[k].returnedQty += Number(r.quantity)||0;
    // status === 'not_returned' -> item already left inventory permanently, no stock change either way
  });
  return Object.values(map).map(m=>{
    const avgBuy = m.purchasedQty>0 ? (m.purchaseCost/m.purchasedQty) : 0;
    const current = m.purchasedQty - m.soldQty - m.damagedQty + m.returnedQty;
    return {...m, avgBuy, current, stockValue: current*avgBuy};
  }).sort((a,b)=> (a.brand+a.item).localeCompare(b.brand+b.item));
}

function inPeriod(dateStr, period){
  if(period === 'all') return true;
  if(!dateStr) return false;
  const d = new Date(dateStr);
  const now = new Date();
  if(period === 'week'){
    const weekAgo = new Date(); weekAgo.setDate(now.getDate()-7);
    return d >= weekAgo && d <= now;
  }
  if(period === 'month'){
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  }
  if(period === 'year'){
    return d.getFullYear() === now.getFullYear();
  }
  return true;
}

/* ---------------------------------------------------
   ALERTS (expiry within 3 months + low stock <= 2)
--------------------------------------------------- */
async function refreshAlerts(){
  const bar = document.getElementById('alertBar');
  if(!bar) return;
  try{
    const data = await getAll();
    const stock = computeStock(data);
    const now = new Date();
    const in3Months = new Date(); in3Months.setMonth(now.getMonth()+3);

    const expiringSoon = stock.filter(s => s.expireDate && s.current > 0 && new Date(s.expireDate) <= in3Months);
    const lowStock = stock.filter(s => s.current > 0 && s.current <= 2);

    let html = '';
    if(expiringSoon.length){
      const list = expiringSoon.map(s=>`${escapeHtml(s.brand?s.brand+' - ':'')}${escapeHtml(s.item)}${s.size?' ('+escapeHtml(s.size)+')':''} — expires ${formatDate(s.expireDate)}`).join(' | ');
      html += `<div class="alert expiry">⏰ Expiring Soon (within 3 months): ${list}</div>`;
    }
    if(lowStock.length){
      const list = lowStock.map(s=>`${escapeHtml(s.brand?s.brand+' - ':'')}${escapeHtml(s.item)}${s.size?' ('+escapeHtml(s.size)+')':''} — only ${s.current} left`).join(' | ');
      html += `<div class="alert lowstock">📉 Low Stock: ${list}</div>`;
    }
    bar.innerHTML = html;
  }catch(e){ console.error('alert refresh failed', e); }
}

/* ---------------------------------------------------
   APP ROOT
--------------------------------------------------- */
const app = document.getElementById('app');

async function renderDashboard(){
  app.innerHTML = `<div class="empty">Loading dashboard...</div>`;
  refreshAlerts();
  const data = await getAll();
  const stock = computeStock(data);
  const stockValue = stock.reduce((s,i)=>s+i.stockValue,0);
  const totalSaleRevenue = data.sales.reduce((s,x)=>s+(Number(x.salePrice)||0)*(Number(x.quantity)||0),0);
  const totalSaleCost = data.sales.reduce((s,x)=>s+(Number(x.costPrice)||0)*(Number(x.quantity)||0),0);
  const totalExpenses = data.expenses.reduce((s,x)=>s+(Number(x.amount)||0),0);
  const totalRefundLoss = data.refunds.reduce((s,x)=>s+(Number(x.amount)||0),0);
  const netProfit = totalSaleRevenue - totalSaleCost - totalExpenses - totalRefundLoss;

  app.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="label">Current Stock Value</div><div class="value">${money(stockValue)}</div></div>
      <div class="stat-card gold"><div class="label">Total Sale Revenue</div><div class="value">${money(totalSaleRevenue)}</div></div>
      <div class="stat-card ${netProfit>=0?'green':'red'}"><div class="label">Net Profit / Loss</div><div class="value">${money(netProfit)}</div></div>
      <div class="stat-card red"><div class="label">Total Expenses</div><div class="value">${money(totalExpenses)}</div></div>
    </div>
    <h2 style="color:var(--primary-dark);margin-bottom:16px;font-size:21px;">Menu</h2>
    <div class="nav-grid">
      <button class="nav-btn c5" onclick="renderVendor()"><div class="icon">🧑‍💼</div><div class="title">Vendor</div></button>
      <button class="nav-btn c1" onclick="renderPurchase()"><div class="icon">🛒</div><div class="title">Purchase</div></button>
      <button class="nav-btn c2" onclick="renderSale()"><div class="icon">💰</div><div class="title">Sale</div></button>
      <button class="nav-btn c4" onclick="renderRefund()"><div class="icon">↩️</div><div class="title">Refund / Damage</div></button>
      <button class="nav-btn c6" onclick="renderExpense()"><div class="icon">🧾</div><div class="title">Expenses</div></button>
      <button class="nav-btn c3" onclick="renderReports()"><div class="icon">📊</div><div class="title">Reports</div></button>
    </div>
    <div class="btn-row">
      <button class="btn btn-outline" onclick="resetAllData()" style="color:var(--danger);border-color:var(--danger);">🗑️ Clear All Data (start fresh)</button>
    </div>
  `;
}

async function saveVendorEdit(id){
  const vendors = await loadList('vendors');
  const idx = vendors.findIndex(x=>x.id===id);
  if(idx<0) return;
  const tr = document.querySelector(`tr[data-vid="${id}"]`);
  const imgInput = tr.querySelector('input[type=file]');
  const imgFile = imgInput && imgInput.files[0];
  const image = imgFile ? await fileToBase64(imgFile) : vendors[idx].image;
  vendors[idx] = {
    ...vendors[idx],
    name: document.getElementById('ev_name_'+id).value.trim(),
    phone: document.getElementById('ev_phone_'+id).value.trim(),
    brand: document.getElementById('ev_brand_'+id).value.trim(),
    item: document.getElementById('ev_item_'+id).value.trim(),
    size: document.getElementById('ev_size_'+id).value.trim(),
    price: document.getElementById('ev_price_'+id).value,
    expireDate: document.getElementById('ev_expire_'+id).value || '',
    date: document.getElementById('ev_date_'+id).value || vendors[idx].date,
    image
  };
  await saveList('vendors', vendors);
  renderVendor();
}
function previewImg(input, id){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    let img = id ? document.getElementById(id) : input.parentElement.querySelector('.f-img-prev');
    if(img){ img.src = e.target.result; img.style.display='block'; }
  };
  reader.readAsDataURL(file);
}
function removeEntryRow(btn){
  const row = btn.closest('.entry-row');
  const wrap = row.parentElement;
  if(wrap.querySelectorAll('.entry-row').length <= 1){ alert('Kam se kam ek row zaroori hai.'); return; }
  row.remove();
}

async function saveAllVendorItems(){
  const name = document.getElementById('vName').value.trim();
  const phone = document.getElementById('vPhone').value.trim();
  const address = document.getElementById('vAddress').value.trim();
  if(!name){ alert('Vendor Name zaroori hai.'); return; }
  const rows = [...document.querySelectorAll('#vendorRows .entry-row')];
  if(!rows.length){ alert('Kam se kam ek item add karein.'); return; }
  const entries = [];
  for(const row of rows){
    const item = row.querySelector('.f-item').value.trim();
    const price = row.querySelector('.f-price').value;
    if(!item || !price){ alert('Har row mein Item Name aur Buy Price zaroori hain.'); return; }
    const imgFile = row.querySelector('.f-image').files[0];
    const image = await fileToBase64(imgFile);
    entries.push({
      id: uid(), name, phone, address,
      brand: row.querySelector('.f-brand').value.trim(), item, size: row.querySelector('.f-size').value.trim(),
      description: row.querySelector('.f-desc').value.trim(), price,
      expireDate: row.querySelector('.f-expire').value || '', date: row.querySelector('.f-date').value || todayStr(), image
    });
  }
  const vendors = await loadList('vendors');
  vendors.push(...entries);
  await saveList('vendors', vendors);
  const check = await loadList('vendors');
  if(check.length !== vendors.length){ alert('⚠️ Save ho gaya lagta hai magar verify nahi hua — dobara Vendor page kholkar check karein.'); }
  else { alert(entries.length + ' item(s) save ho gaye vendor "' + name + '" ke liye!'); }
  renderVendor();
}

function onPurchaseRowMatchChange(el){
  const row = el.closest('.entry-row');
  const brand = row.querySelector('.f-brand').value;
  const item = row.querySelector('.f-item').value;
  const size = row.querySelector('.f-size').value;
  const match = findVendorCatalogEntry(purchaseVendorsCache, brand, item, size);
  if(match){
    row.querySelector('.f-buyprice').value = match.price;
    row.querySelector('.f-desc').value = match.description || '';
    if(match.expireDate) row.querySelector('.f-expire').value = match.expireDate;
    const prev = row.querySelector('.f-img-prev');
    if(match.image && !row.querySelector('.f-image').files[0]){
      prev.src = match.image; prev.style.display = 'block';
      row.dataset.catalogImage = match.image;
    }
  }
}
async function saveAllPurchases(){
  const vendorSel = document.getElementById('pVendorId');
  const date = document.getElementById('pDate').value || todayStr();
  if(!vendorSel.value){ alert('Vendor select karein.'); return; }
  const vendorName = vendorSel.options[vendorSel.selectedIndex].dataset.name || '';
  const rows = [...document.querySelectorAll('#purchaseRows .entry-row')];
  if(!rows.length){ alert('Kam se kam ek item add karein.'); return; }
  const entries = [];
  for(const row of rows){
    const item = row.querySelector('.f-item').value.trim();
    const buyPrice = row.querySelector('.f-buyprice').value;
    const quantity = row.querySelector('.f-qty').value;
    if(!item || !buyPrice || !quantity){ alert('Har row mein Item, Buy Price aur Quantity zaroori hain.'); return; }
    const imgFile = row.querySelector('.f-image').files[0];
    const image = imgFile ? await fileToBase64(imgFile) : (row.dataset.catalogImage || '');
    entries.push({
      id: uid(), date, vendorId: vendorSel.value, vendorName,
      brand: row.querySelector('.f-brand').value.trim(), item, size: row.querySelector('.f-size').value.trim(),
      description: row.querySelector('.f-desc').value.trim(), buyPrice, quantity,
      salePrice: row.querySelector('.f-saleprice').value, expireDate: row.querySelector('.f-expire').value || '', image, invoice: ''
    });
  }
  const purchases = await loadList('purchases');
  purchases.push(...entries);
  await saveList('purchases', purchases);
  const check = await loadList('purchases');
  if(check.length !== purchases.length){ alert('⚠️ Save ho gaya lagta hai magar verify nahi hua — page reload karke Stock Report check karein.'); }
  else { alert(entries.length + ' purchase entries save ho gayi!'); }
  renderPurchase();
}

function onSaleRowMatchChange(el){
  const row = el.closest('.entry-row');
  const brand = row.querySelector('.f-brand').value;
  const item = row.querySelector('.f-item').value;
  const size = row.querySelector('.f-size').value;
  const k = itemKey(brand, item, size);
  const match = saleStockCache.find(s => itemKey(s.brand,s.item,s.size) === k);
  const costEl = row.querySelector('.f-cost');
  const availEl = row.querySelector('.f-avail');
  if(match){
    costEl.value = Number(match.avgBuy).toFixed(2);
    if(!row.querySelector('.f-saleprice').value && match.lastSalePrice){
      row.querySelector('.f-saleprice').value = match.lastSalePrice;
    }
    let usedByOthers = 0;
    document.querySelectorAll('#saleRows .entry-row').forEach(r=>{
      if(r===row) return;
      const b=r.querySelector('.f-brand').value, i=r.querySelector('.f-item').value, s=r.querySelector('.f-size').value;
      if(itemKey(b,i,s)===k) usedByOthers += Number(r.querySelector('.f-qty').value)||0;
    });
    availEl.value = Math.max(0, match.current - usedByOthers);
  } else {
    costEl.value = '';
    availEl.value = '';
  }
}
async function saveAllSales(){
  const rows = [...document.querySelectorAll('#saleRows .entry-row')];
  if(!rows.length){ alert('Kam se kam ek item add karein.'); return; }
  const data = await getAll();
  const stock = computeStock(data);
  const entries = [];
  const usedMap = {};
  for(const row of rows){
    const date = row.querySelector('.f-date').value || todayStr();
    const brand = row.querySelector('.f-brand').value.trim();
    const item = row.querySelector('.f-item').value.trim();
    const size = row.querySelector('.f-size').value.trim();
    const qty = Number(row.querySelector('.f-qty').value)||0;
    const salePrice = Number(row.querySelector('.f-saleprice').value)||0;
    if(!item || qty<=0 || !salePrice){ alert('Har row mein Item Name, Quantity aur Sale Price zaroori hain.'); return; }
    const k = itemKey(brand, item, size);
    const match = stock.find(s => itemKey(s.brand,s.item,s.size) === k);
    const avail = match ? match.current : 0;
    usedMap[k] = (usedMap[k]||0) + qty;
    if(usedMap[k] > avail){ alert(`"${item}" ki stock mein sirf ${avail} available hain, aap total ${usedMap[k]} sell karne ki koshish kar rahe hain.`); return; }
    entries.push({
      id: uid(), date, brand, item, size,
      description: match ? (match.lastDesc||'') : '', quantity: qty, salePrice, costPrice: match ? match.avgBuy : 0,
      image: match ? (match.lastImage||'') : ''
    });
  }
  const sales = await loadList('sales');
  sales.push(...entries);
  await saveList('sales', sales);
  const check = await loadList('sales');
  if(check.length !== sales.length){ alert('⚠️ Save ho gaya lagta hai magar verify nahi hua — page reload karke Sale Report check karein.'); }
  else { alert(entries.length + ' sale entries save ho gayi!'); }
  renderSale();
}

      <div class="summary-box"><div class="l">Total Entries</div><div class="v">${rows.length}</div></div></div>
      <div class="card"><div class="table-wrap"><table><thead><tr><th>Pic</th><th>Date</th><th>Vendor</th><th>Brand</th><th>Item</th><th>Size</th><th>Qty</th><th>Buy Price</th><th>Total</th></tr></thead>
      <tbody>${rows.length?sortByDateDesc(rows).map(p=>`<tr><td>${p.image?`<img class="thumb" src="${p.image}">`:'—'}</td><td>${formatDate(p.date)}</td><td>${escapeHtml(p.vendorName)}</td><td>${escapeHtml(p.brand)}</td><td>${escapeHtml(p.item)}</td><td>${escapeHtml(p.size)}</td><td>${p.quantity}</td><td>${money(p.buyPrice)}</td><td>${money(p.quantity*p.buyPrice)}</td></tr>`).join(''):`<tr><td colspan="9" class="empty">Is period mein koi purchase nahi.</td></tr>`}</tbody></table></div></div>`;
  }

  else if(currentReportTab === 'sale'){
    const rows = data.sales.filter(s=>inPeriod(s.date, period));
    const revenue = rows.reduce((s,x)=>s+x.salePrice*x.quantity,0);
    const cost = rows.reduce((s,x)=>s+x.costPrice*x.quantity,0);
    const profit = revenue-cost;
    body.innerHTML = `
      <div class="summary-strip">
        <div class="summary-box"><div class="l">Revenue</div><div class="v">${money(revenue)}</div></div>
        <div class="summary-box"><div class="l">Cost</div><div class="v">${money(cost)}</div></div>
        <div class="summary-box"><div class="l">${profit>=0?'Profit':'Loss'}</div><div class="v" style="color:${profit>=0?'var(--success)':'var(--danger)'}">${money(profit)}</div></div>
      </div>
      <div class="card"><div class="table-wrap"><table><thead><tr><th>Pic</th><th>Date</th><th>Brand</th><th>Item</th><th>Size</th><th>Qty</th><th>Sale Price</th><th>Cost</th><th>Profit/Loss</th></tr></thead>
      <tbody>${rows.length?sortByDateDesc(rows).map(s=>{const pr=(s.salePrice-s.costPrice)*s.quantity;return `<tr><td>${s.image?`<img class="thumb" src="${s.image}">`:'—'}</td><td>${formatDate(s.date)}</td><td>${escapeHtml(s.brand)}</td><td>${escapeHtml(s.item)}</td><td>${escapeHtml(s.size)}</td><td>${s.quantity}</td><td>${money(s.salePrice)}</td><td>${money(s.costPrice)}</td><td><span class="pill ${pr>=0?'profit':'loss'}">${money(pr)}</span></td></tr>`;}).join(''):`<tr><td colspan="9" class="empty">Is period mein koi sale nahi.</td></tr>`}</tbody></table></div></div>`;
  }

  else if(currentReportTab === 'refund'){
    const rows = data.refunds.filter(r=>inPeriod(r.date, period));
    const refundTotal = rows.filter(r=>r.type==='refund').reduce((s,x)=>s+Number(x.amount||0),0);
    const damageTotal = rows.filter(r=>r.type==='damage').reduce((s,x)=>s+Number(x.amount||0),0);
    body.innerHTML = `
      <div class="summary-strip">
        <div class="summary-box"><div class="l">Refund Loss</div><div class="v">${money(refundTotal)}</div></div>
        <div class="summary-box"><div class="l">Damage Loss</div><div class="v">${money(damageTotal)}</div></div>
        <div class="summary-box"><div class="l">Total Loss</div><div class="v">${money(refundTotal+damageTotal)}</div></div>
      </div>
      <div class="card"><div class="table-wrap"><table><thead><tr><th>Pic</th><th>Date</th><th>Type</th><th>Brand</th><th>Item</th><th>Size</th><th>Qty</th><th>Amount</th><th>Status</th><th>Reason</th></tr></thead>
      <tbody>${rows.length?sortByDateDesc(rows).map(r=>`<tr><td>${r.image?`<img class="thumb" src="${r.image}">`:'—'}</td><td>${formatDate(r.date)}</td><td><span class="pill ${r.type==='damage'?'damage':'refund'}">${r.type}</span></td><td>${escapeHtml(r.brand)}</td><td>${escapeHtml(r.item)}</td><td>${escapeHtml(r.size)}</td><td>${r.quantity}</td><td>${money(r.amount)}</td><td>${r.status==='returned'?'Returned':r.status==='expired'?'Expired':'Not returned'}</td><td>${escapeHtml(r.reason)}</td></tr>`).join(''):`<tr><td colspan="10" class="empty">Is period mein koi refund/damage nahi.</td></tr>`}</tbody></table></div></div>`;
  }

  else if(currentReportTab === 'stock'){
    const stock = computeStock(data);
    const totalValue = stock.reduce((s,x)=>s+x.stockValue,0);
    body.innerHTML = `
      <div class="summary-strip"><div class="summary-box"><div class="l">Total Stock Value</div><div class="v">${money(totalValue)}</div></div>
      <div class="summary-box"><div class="l">Items in Stock</div><div class="v">${stock.filter(s=>s.current>0).length}</div></div></div>
      <div class="card"><div class="table-wrap"><table><thead><tr><th>Pic</th><th>Brand</th><th>Item</th><th>Size</th><th>Purchased</th><th>Sold</th><th>Damaged</th><th>Available Qty</th><th>Avg Buy Price</th><th>Stock Value</th><th>Expire</th></tr></thead>
      <tbody>${stock.length?stock.map(s=>`<tr><td>${s.lastImage?`<img class="thumb" src="${s.lastImage}">`:'—'}</td><td>${escapeHtml(s.brand)}</td><td>${escapeHtml(s.item)}</td><td>${escapeHtml(s.size)}</td><td>${s.purchasedQty}</td><td>${s.soldQty}</td><td>${s.damagedQty}</td><td><span class="badge-stock ${s.current<=2?'low':''}">${s.current}</span></td><td>${money(s.avgBuy)}</td><td>${money(s.stockValue)}</td><td>${s.expireDate?formatDate(s.expireDate):'—'}</td></tr>`).join(''):`<tr><td colspan="11" class="empty">Stock khali hai.</td></tr>`}</tbody></table></div></div>`;
  }

  else if(currentReportTab === 'expense'){
    const rows = data.expenses.filter(e=>inPeriod(e.date, period));
    const total = rows.reduce((s,x)=>s+Number(x.amount||0),0);
    body.innerHTML = `
      <div class="summary-strip"><div class="summary-box"><div class="l">Total Expenses</div><div class="v">${money(total)}</div></div></div>
      <div class="card"><div class="table-wrap"><table><thead><tr><th>Pic</th><th>Date</th><th>Category</th><th>Amount</th><th>Note</th></tr></thead>
      <tbody>${rows.length?sortByDateDesc(rows).map(e=>`<tr><td>${e.image?`<img class="thumb" src="${e.image}">`:'—'}</td><td>${formatDate(e.date)}</td><td>${escapeHtml(e.category)}</td><td>${money(e.amount)}</td><td>${escapeHtml(e.note)}</td></tr>`).join(''):`<tr><td colspan="5" class="empty">Is period mein koi expense nahi.</td></tr>`}</tbody></table></div></div>`;
  }

  else if(currentReportTab === 'balance'){
    const sales = data.sales.filter(s=>inPeriod(s.date, period));
    const purchases = data.purchases.filter(p=>inPeriod(p.date, period));
    const refunds = data.refunds.filter(r=>inPeriod(r.date, period));
    const expenses = data.expenses.filter(e=>inPeriod(e.date, period));
    const stock = computeStock(data);
    const revenue = sales.reduce((s,x)=>s+x.salePrice*x.quantity,0);
    const costOfGoodsSold = sales.reduce((s,x)=>s+x.costPrice*x.quantity,0);
    const purchaseCost = purchases.reduce((s,x)=>s+x.quantity*x.buyPrice,0);
    const refundLoss = refunds.reduce((s,x)=>s+Number(x.amount||0),0);
    const expenseTotal = expenses.reduce((s,x)=>s+Number(x.amount||0),0);
    const stockValue = stock.reduce((s,x)=>s+x.stockValue,0);
    const netProfit = revenue - costOfGoodsSold - refundLoss - expenseTotal;
    body.innerHTML = `
      <div class="card">
        <h3 style="color:var(--primary-dark);margin-bottom:16px;">Balance Sheet — ${period === 'all' ? 'All Time' : period.charAt(0).toUpperCase()+period.slice(1)}</h3>
        <table>
          <tr><td><b>Sale Revenue</b></td><td style="text-align:right;color:var(--success);font-weight:700;">+ ${money(revenue)}</td></tr>
          <tr><td>Cost of Goods Sold (purchase cost of sold items)</td><td style="text-align:right;color:var(--danger);">- ${money(costOfGoodsSold)}</td></tr>
          <tr><td>Total Purchases (this period)</td><td style="text-align:right;color:var(--muted);">${money(purchaseCost)}</td></tr>
          <tr><td>Refund / Damage Loss</td><td style="text-align:right;color:var(--danger);">- ${money(refundLoss)}</td></tr>
          <tr><td>Other Expenses</td><td style="text-align:right;color:var(--danger);">- ${money(expenseTotal)}</td></tr>
          <tr style="border-top:2px solid var(--border);"><td style="padding-top:14px;"><b>Net Profit / Loss</b></td><td style="text-align:right;padding-top:14px;font-size:18px;font-weight:800;color:${netProfit>=0?'var(--success)':'var(--danger)'}">${money(netProfit)}</td></tr>
          <tr><td style="padding-top:18px;"><b>Current Stock Value (on hand)</b></td><td style="text-align:right;padding-top:18px;font-weight:700;color:var(--primary-dark);">${money(stockValue)}</td></tr>
        </table>
      </div>`;
  }
}

/* ---------------------------------------------------
   EXPOSE FUNCTIONS TO WINDOW (needed because this is a module script,
   and onclick="" handlers in the HTML look up the global/window scope)
--------------------------------------------------- */
Object.assign(window, {
  renderDashboard, renderVendor, renderPurchase, renderSale, renderRefund, renderExpense, renderReports,
  deleteRecord, previewImg, removeEntryRow,
  addVendorRow, saveAllVendorItems, filterVendorTable, editVendorItem, saveVendorEdit,
  addPurchaseRow, onPurchaseRowMatchChange, saveAllPurchases, filterPurchaseTable, editPurchaseItem, savePurchaseEdit,
  addSaleRow, onSaleRowMatchChange, saveAllSales, filterSaleTable, editSaleItem, saveSaleEdit,
  addRefundRow, onRefundRowMatchChange, saveAllRefunds,
  addExpenseRow, saveAllExpenses,
  doLogin, doLogout, resetAllData
});

/* ---------------------------------------------------
   INIT
--------------------------------------------------- */
if(isLoggedIn()){ renderDashboard(); } else { renderLogin(); }
</script>
</body>
</html>
